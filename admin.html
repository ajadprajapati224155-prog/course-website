<!DOCTYPE html>
<html>
<head>

<title>SSC Library Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#07142c;
font-family:sans-serif;
color:white;
text-align:center;
}

.card{
background:#0f1f3d;
padding:25px;
border-radius:15px;
margin:20px;
box-shadow:0 0 15px #0b5ed7;
}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:10px 20px;
background:#2f6edb;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#1e56b8;
}

.listCard{
background:#0f1f3d;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>


<div id="loginBox">

<h2>🔐 Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">

<br><br>

<button onclick="checkLogin()">Login</button>

</div>



<div id="adminPanel" style="display:none">

<h2>⚙ SSC Library Admin Panel</h2>



<div class="card">

<h3>📢 Send Notification</h3>

<input id="title" placeholder="Notification Title">

<textarea id="message" placeholder="Notification Message"></textarea>

<button onclick="sendNotification()">Send Notification</button>

</div>



<div class="card">

<h3>➕ Add New Course</h3>

<input id="courseName" placeholder="Batch Name">

<input id="teacherName" placeholder="Teacher Name">

<input id="courseLink" placeholder="HTML File Name (example: gk.html)">

<br>

<button type="button" onclick="addCourse()">Add Batch</button>

</div>



<button onclick="toggleCourses()">📚 View Courses</button>

<div id="coursesSection" style="display:none">

<h3>📚 Courses List</h3>

<input type="text" id="searchCourse" placeholder="Search batch..." onkeyup="searchCourse()">

<div id="courseList"></div>

</div>



<button onclick="toggleStudents()">👨‍🎓 View Students</button>

<div id="studentsSection" style="display:none">

<h3>👨‍🎓 Students List</h3>

<input type="text" id="searchStudent" placeholder="Search student..." onkeyup="searchStudent()">

<div id="studentList"></div>

</div>


</div>



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>



<script>

const firebaseConfig = {

apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



function checkLogin(){

let pass=document.getElementById("adminPass").value;

if(pass=="12345"){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";

}

else{

alert("Wrong Password ❌");

}

}



function sendNotification(){

let title=document.getElementById("title").value;
let message=document.getElementById("message").value;

db.collection("notifications").add({

title:title,
message:message,
time:new Date().toLocaleString()

});

alert("Notification Sent ✅");

}



function addCourse(){

let name=document.getElementById("courseName").value;
let teacher=document.getElementById("teacherName").value;
let link=document.getElementById("courseLink").value;

if(name=="" || teacher=="" || link==""){

alert("Please fill all fields ❗");

return;

}

db.collection("courses").add({

name:name,
teacher:teacher,
link:link

})
.then(function(){

alert("Batch Added Successfully ✅");

document.getElementById("courseName").value="";
document.getElementById("teacherName").value="";
document.getElementById("courseLink").value="";

loadCourses();

});

}



function toggleCourses(){

let sec=document.getElementById("coursesSection");

sec.style.display = sec.style.display=="none" ? "block":"none";

loadCourses();

}



function loadCourses(){

db.collection("courses").get().then((snapshot)=>{

let container=document.getElementById("courseList");

container.innerHTML="";

snapshot.forEach((doc)=>{

let course=doc.data();

container.innerHTML+=`

<div class="listCard">

<b>${course.name}</b><br>

👨‍🏫 ${course.teacher}<br>

🔗 ${course.link}

<br><br>

<button onclick="editCourse('${doc.id}','${course.name}','${course.teacher}','${course.link}')">✏ Edit</button>

<button onclick="deleteCourse('${doc.id}')">❌ Delete</button>

</div>

`;

});

});

}



function deleteCourse(id){

if(confirm("Delete this course?")){

db.collection("courses").doc(id).delete();

alert("Course Deleted ❌");

loadCourses();

}

}



function editCourse(id,name,teacher,link){

let newName=prompt("Edit Batch Name",name);

let newTeacher=prompt("Edit Teacher Name",teacher);

let newLink=prompt("Edit HTML File",link);

db.collection("courses").doc(id).update({

name:newName,
teacher:newTeacher,
link:newLink

});

alert("Course Updated ✏");

loadCourses();

}



function toggleStudents(){

let sec=document.getElementById("studentsSection");

sec.style.display = sec.style.display=="none" ? "block":"none";

loadStudents();

}



function loadStudents(){

db.collection("students").get().then((snapshot)=>{

let container=document.getElementById("studentList");

container.innerHTML="";

snapshot.forEach((doc)=>{

let student=doc.data();

container.innerHTML+=`

<div class="listCard">

👤 Name : ${student.name || "N/A"}<br>

🆔 Username : ${student.username || "N/A"}<br>

📱 Mobile : ${student.phone || student.mobile || "N/A"}<br>

📅 DOB : ${student.dob || student.date || "N/A"}

</div>

`;

});

});

}



function searchStudent(){

let input=document.getElementById("searchStudent").value.toLowerCase();

let cards=document.querySelectorAll("#studentList .listCard");

cards.forEach(card=>{

if(card.innerText.toLowerCase().includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

</script>


</body>
</html>
