<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSC Library Admin</title>

<style>

body{
font-family:sans-serif;
background:#0b1320;
color:white;
text-align:center;
padding:20px;
}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
background:#3b82f6;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
margin-top:20px;
box-shadow:0 0 10px #3b82f6;
}

.studentCard{
background:#111827;
padding:15px;
border-radius:12px;
margin:10px auto;
max-width:420px;
text-align:left;
box-shadow:0 0 5px #3b82f6;
}

#studentsSection{
display:none;
margin-top:30px;
}

</style>
</head>

<body>

<div id="loginBox" style="margin-top:120px;">

<h2>🔐 Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">

<br><br>

<button onclick="checkLogin()">Login</button>

</div>



<div id="adminPanel" style="display:none;">

<h2>⚙️ SSC Library Admin Panel</h2>

<div class="card">

<h3>📢 Send Notification</h3>

<input id="title" placeholder="Notification Title">

<textarea id="message" placeholder="Notification Message"></textarea>

<button onclick="sendNotification()">Send Notification</button>

<hr>

<h3>➕ Add New Course</h3>

<input id="courseName" placeholder="Course Name">

<input id="courseLink" placeholder="Course Page Link (example: maths.html)">

<input id="courseImage" placeholder="Course Thumbnail Image URL">

<button onclick="addCourse()">Add Course</button>

</div>


<h3 style="margin-top:30px;">📚 Courses List</h3>

<div id="courseList"></div>


<br>

<button onclick="toggleStudents()">📋 View Students</button>

<div id="studentsSection">

<h3>👨‍🎓 Students List</h3>

<input type="text" id="searchStudent" placeholder="Search student..." onkeyup="searchStudent()">

<div id="studentList"></div>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let studentsData=[];



function checkLogin(){

let pass=document.getElementById("adminPass").value;

if(pass==="ssc123"){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadCourses();

}else{

alert("Wrong Password ❌");

}

}



function sendNotification(){

let title=document.getElementById("title").value;
let message=document.getElementById("message").value;

db.collection("notifications").add({

title:title,
message:message,
time:new Date().toLocaleString()

});

alert("Notification Sent ✅");
}



function addCourse(){

let name=document.getElementById("courseName").value;
let link=document.getElementById("courseLink").value;
let image=document.getElementById("courseImage").value;

db.collection("courses").add({

name:name,
link:link,
image:image

});

alert("Course Added Successfully ✅");

loadCourses();

}



function loadCourses(){

db.collection("courses").get().then((snapshot)=>{

document.getElementById("courseList").innerHTML="";

snapshot.forEach((doc)=>{

let data=doc.data();

let div=document.createElement("div");

div.className="studentCard";

div.innerHTML=`

📚 <b>${data.name}</b><br>

🔗 ${data.link}<br>

<img src="${data.image}" width="100%">

<br><br>

<button onclick="editCourse('${doc.id}','${data.name}','${data.link}','${data.image}')">✏️ Edit</button>

<button onclick="deleteCourse('${doc.id}')">❌ Delete</button>

`;

document.getElementById("courseList").appendChild(div);

});

});

}

function editCourse(id,name,link,image){

let newName = prompt("Edit Course Name", name);
if(newName === null) return;

let newLink = prompt("Edit Course Link", link);
if(newLink === null) return;

let newImage = prompt("Edit Image URL", image);
if(newImage === null) return;

db.collection("courses").doc(id).update({
name:newName,
link:newLink,
image:newImage
}).then(()=>{

alert("Course Updated ✅");
loadCourses();

});

}

function deleteCourse(id){

if(confirm("Delete this course?")){

db.collection("courses").doc(id).delete();

alert("Course Deleted ❌");

loadCourses();

}

}



function toggleStudents(){

let section=document.getElementById("studentsSection");

if(section.style.display==="none"){

section.style.display="block";
loadStudents();

}else{

section.style.display="none";

}

}



function loadStudents(){

db.collection("students").get().then((snapshot)=>{

studentsData=[];
document.getElementById("studentList").innerHTML="";

snapshot.forEach((doc)=>{

let data=doc.data();
studentsData.push(data);

createCard(data);

});

});

}



function createCard(data){

let div=document.createElement("div");

div.className="studentCard";

div.innerHTML=`

👤 <b>${data.name}</b><br>
📱 ${data.phone}<br>
🆔 ${data.username}<br>
🎂 ${data.dob || "Not set"}

`;

document.getElementById("studentList").appendChild(div);

}



function searchStudent(){

let text=document.getElementById("searchStudent").value.toLowerCase();

document.getElementById("studentList").innerHTML="";

studentsData.forEach((data)=>{

if(data.name.toLowerCase().includes(text) || data.username.toLowerCase().includes(text)){

createCard(data);

}

});

}

</script>

</body>
</html>
