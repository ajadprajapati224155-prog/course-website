<!DOCTYPE html>
<html>

<head>

<title>Student Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
background:#0b1320;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:80px;
}

.authBox{
width:320px;
margin:auto;
margin-top:80px;
padding:25px;
background:#0b1320;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
}

.authBox h2{
color:#4da3ff;
margin-bottom:20px;
}

.authBox input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#1b2235;
color:white;
}

.authBox button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#3a8cff;
color:white;
font-weight:bold;
cursor:pointer;
}

.authBox button:hover{
background:#2a6fd6;
}

#msg{
margin-top:10px;
color:#ff4d4d;
font-size:14px;
}

</style>

</head>

<body>

<div class="authBox">

<h2>🎓 SSC Library Student Portal</h2>

<!-- SIGNUP -->
<h3>Student Signup</h3>

<input type="text" id="fullName" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Phone Number">

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<hr>

<!-- LOGIN -->

<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyC-WBjo...",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function signup(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let username=document.getElementById("username").value.trim();
let password=document.getElementById("password").value.trim();

let namePattern=/^[A-Za-z ]{3,}$/;
let phonePattern=/^[0-9]{10}$/;
let userPattern=/^[a-zA-Z0-9_]{4,}$/;

if(!namePattern.test(name)){
alert("Enter valid name (letters only)");
return;
}

if(!phonePattern.test(phone)){
alert("Enter valid 10 digit phone number");
return;
}

if(!userPattern.test(username)){
alert("Username must be 4+ letters or numbers");
return;
}

if(password.length<5){
alert("Password must be at least 5 characters");
return;
}

db.collection("students").doc(username).get().then((doc)=>{

if(doc.exists){

alert("Username already exists ❌");

}else{

db.collection("students").doc(username).set({

name:name,
phone:phone,
username:username,
password:password

});

alert("Signup successful ✅");

}

});

}

function login(){

let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;
if(user=="" || pass==""){
alert("Please enter username and password");
return;
}
db.collection("students").doc(user).get().then((doc)=>{

if(doc.exists){

let data=doc.data();

if(data.password===pass){

localStorage.setItem("student", JSON.stringify(data));

alert("Login Success ✅");

window.location="index.html";

}else{

alert("Wrong Password ❌");

}

}else{

alert("User not found ❌");

}

});

}

</script>

</body>

</html>
