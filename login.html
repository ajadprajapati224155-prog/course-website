<!DOCTYPE html>
<html>

<head>

<title>Student Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
background:#0b1320;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.authBox{
width:320px;
margin:auto;
margin-top:80px;
padding:25px;
background:#0b1320;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
}

.authBox h2{
color:#4da3ff;
margin-bottom:20px;
}

.authBox input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#1b2235;
color:white;
}

.authBox button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#3a8cff;
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.authBox button:hover{
background:#2563eb;
}

#msg{
margin-top:10px;
color:#ff4d4d;
font-size:14px;
}

</style>

</head>

<body>

<div class="authBox">

<h2>🎓 SSC Library Student Portal</h2>

<!-- SIGNUP -->
<h3>Student Signup</h3>

<input type="text" id="fullName" placeholder="Full Name" maxlength="15">
<p id="nameError" style="color:red;font-size:13px;"></p>

<input type="tel" id="phone" placeholder="Phone Number" maxlength="10">
<p id="phoneError" style="color:red;font-size:13px;"></p>
  
<input type="text" id="username" placeholder="@username" maxlength="12">
<p id="userError" style="color:red;font-size:13px;"></p>

<div style="position:relative;">
<input type="password" id="password" placeholder="Password" maxlength="12">
<span onclick="togglePass()" style="position:absolute;right:10px;top:10px;cursor:pointer;">👁</span>
</div>

<p id="passError" style="color:red;font-size:13px;"></p>
<button onclick="signup()">Create Account</button>

<hr>

<!-- LOGIN -->

<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">

<div style="position:relative;">
<input type="password" id="loginPass" placeholder="Password">
<span onclick="toggleLoginPass()" 
style="position:absolute;right:10px;top:10px;cursor:pointer;">👁</span>
</div>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC-WBjo...",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function signup(){

let name=document.getElementById("fullName").value.trim();
let phone=document.getElementById("phone").value.trim();
let username=document.getElementById("username").value.trim();
let password=document.getElementById("password").value.trim();

document.getElementById("nameError").innerText="";
document.getElementById("phoneError").innerText="";
document.getElementById("userError").innerText="";
document.getElementById("passError").innerText="";
document.getElementById("msg").innerText="";

let namePattern=/^[A-Za-z ]{3,15}$/;
let phonePattern=/^[0-9]{10}$/;
let userPattern=/^@[a-zA-Z0-9]{3,11}$/;
let passPattern=/^[A-Za-z0-9]{5,12}$/;

if(!namePattern.test(name)){
document.getElementById("nameError").innerText="Name must be letters only (max 15)";
return;
}

if(!phonePattern.test(phone)){
document.getElementById("phoneError").innerText="Phone must be 10 digits";
return;
}

if(!userPattern.test(username)){
document.getElementById("userError").innerText="Username must start with @ (example: @amit)";
return;
}

if(!passPattern.test(password)){
document.getElementById("passError").innerText="Password 5-12 letters or numbers only";
return;
}

db.collection("students")
.where("phone","==",phone)
.get()
.then((query)=>{

if(!query.empty){
document.getElementById("phoneError").innerText="Phone already registered";
return;
}

db.collection("students").doc(username).set({

name:name,
phone:phone,
username:username,
password:password,
created:Date.now()

}).then(()=>{

localStorage.setItem("student",JSON.stringify({

name:name,
phone:phone,
username:username

}));

localStorage.setItem("studentName", name);

document.getElementById("msg").style.color="lightgreen";
document.getElementById("msg").innerText="Signup successful ✅ Now login";

});

});

}

function login(){

let user = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

db.collection("students").doc(user).get().then((doc)=>{

if(doc.exists){

let data = doc.data();

if(data.password == pass){

localStorage.setItem("login","true");

localStorage.setItem("student", JSON.stringify({
name:data.name,
phone:data.phone,
username:data.username
}));

window.location.href="index.html";

}

}else{
alert("Wrong Password");
}

}else{
alert("User not found");
}

});
}
function togglePass(){

let p=document.getElementById("password");

if(p.type==="password"){
p.type="text";
}else{
p.type="password";
}

}

function toggleLoginPass(){

let p=document.getElementById("loginPass");

if(p.type==="password"){
p.type="text";
}else{
p.type="password";
}

}

</script>

</body>

</html>
