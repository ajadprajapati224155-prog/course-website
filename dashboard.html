<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<style>

body{
background:#0b1320;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:80px;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:8px;
margin:10px;
}

</style>

</head>

<body>

<h1>🎓 Student Dashboard</h1>

<h2 id="welcome"></h2>

<button onclick="openCourse()">📚 Open Courses</button>

<button onclick="logout()">🚪 Logout</button>

<script>

let user = localStorage.getItem("student");

document.getElementById("welcome").innerText="Welcome "+user;

function openCourse(){

window.location="index.html";

}

function logout(){

localStorage.removeItem("student");

window.location="login.html";

}

</script>

</body>

</html>
