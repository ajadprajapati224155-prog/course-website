<!DOCTYPE html>
<html>

<head>

<title>Video Lecture</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>

body{
background:#0b1320;
color:white;
font-family:sans-serif;
text-align:center;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

.playlist{
margin-top:30px;
}

.playlist button{
display:block;
width:200px;
margin:10px auto;
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
}

.lecture-card{
background:#0f172a;
padding:20px;
border-radius:15px;
margin-top:25px;
}

.lecture-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
display:block;
text-align:center;
padding:14px;
border-radius:12px;
color:white;
font-weight:bold;
text-decoration:none;
}

.video{background:#2563eb;}
.eng{background:#6366f1;}
.hindi{background:#7c3aed;}
.quiz{background:#ec4899;}
.ppt{background:#14b8a6; grid-column:span 2;}
  
.video-container{
position: relative;
padding-bottom: 56.25%;
height:0;
overflow:hidden;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:10px;
}
  
.notes{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>📺 SSC Lecture Player</h1>

<div class="video-container">

<iframe id="player"
src="https://www.youtube.com/embed/axeNkCC4wLE"
frameborder="0"
allowfullscreen>
</iframe>

</div>


<div class="lecture-card">

<h2>CELL - LEC 1</h2>

<div class="lecture-grid">

<a href="video.html" class="btn video">VIDEO</a>

<a href="engnotes.pdf" class="btn eng">ENG NOTES</a>

<a href="hindinotes.pdf" class="btn hindi">HINDI NOTES</a>

<a href="quiz.html" class="btn quiz">QUIZ</a>

<a href="notes.pdf" class="btn ppt" target="_blank">📄 OPEN NOTES</a>

</div>

</div>

<script>

const player = new Plyr('#player',{
controls:[
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
],
settings:['speed','quality'],
speed:{selected:1,options:[0.5,1,1.5,2]}
});

function changeVideo(id){
document.getElementById("player").src =
"https://www.youtube.com/embed/" + id;
}

</script>

</body>
</html>
