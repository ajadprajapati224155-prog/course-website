<!DOCTYPE html>
<html>

<head>

<title>Video Lecture</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>

body{
background:#0b1320;
color:white;
font-family:sans-serif;
text-align:center;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

.playlist{
margin-top:30px;
}

.playlist button{
display:block;
width:200px;
margin:10px auto;
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
}

.video-container{
position: relative;
padding-bottom: 56.25%;
height:0;
overflow:hidden;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:10px;
}
  
.notes{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>📺 SSC Lecture Player</h1>

<div class="video-container">

<iframe id="player"
src="https://www.youtube.com/embed/axeNkCC4wLE"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="notes">

<a href="pdf.html">📄 Open Notes</a>

</div>

<div class="playlist">

<h2>Lecture Playlist</h2>

<button onclick="changeVideo('axeNkCC4wLE')">Lecture 1</button>
<button onclick="changeVideo('lecture2.mp4')">Lecture 2</button>
<button onclick="changeVideo('lecture3.mp4')">Lecture 3</button>

</div>

<script>

const player = new Plyr('#player',{
controls:[
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
],
settings:['speed','quality'],
speed:{selected:1,options:[0.5,1,1.5,2]}
});

function changeVideo(id){
document.getElementById("player").src =
"https://www.youtube.com/embed/" + id;
}

</script>

</body>
</html>
