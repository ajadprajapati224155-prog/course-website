<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC LIBRARY</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020d22;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#08142b;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.menuIcon{
position:absolute;
left:20px;
font-size:28px;
cursor:pointer;
}

.bellIcon{
position:absolute;
right:20px;
font-size:24px;
cursor:pointer;
}

#notifCount{
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:20px;
position:absolute;
top:-8px;
right:-10px;
}

/* SEARCH */

.searchBox{
margin-top:90px;
display:flex;
justify-content:center;
}

.searchBox input{
width:85%;
padding:14px;
border:none;
border-radius:30px;
background:#081a3c;
color:white;
outline:none;
box-shadow:0 0 10px #0b7dd3;
}

/* COURSE */

#courseList{
margin-top:40px;
display:flex;
justify-content:center;
}

.course-card{
width:85%;
background:#081a3a;
padding:20px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-decoration:none;
color:white;
}

.course-icon{
font-size:26px;
margin-right:15px;
}

.course-info h3{
margin:0;
}

.course-info p{
margin:3px 0;
color:#9db4ff;
}

.course-arrow{
font-size:24px;
}

/* SOCIAL ICONS */

.social{
position:fixed;
bottom:25px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.socialBtn{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:18px;
background:linear-gradient(135deg,#00b4ff,#007bff);
box-shadow:0 0 20px rgba(0,150,255,0.6);
font-size:24px;
color:white;
text-decoration:none;
transition:0.3s;
}

.socialBtn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00b4ff;
}

.sideMenu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#08142b;
padding:20px;
transition:0.3s;
z-index:2000;
}

.sideMenu h3{
margin-top:40px;
}

.sideMenu a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:18px;
}

.profilePanel{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#061a36;
padding:25px;
transition:0.4s;
z-index:3000;
overflow:auto;

/* PANEL BY DEFAULT HIDE */
transform:translateX(-100%);
}

.profilePic{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #4aa8ff;
margin:30px auto;
}

.studentName{
text-align:center;
color:#7fb6ff;
}

.profileBtn{
width:90%;
padding:16px;
margin:10px auto;
display:block;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#4aa8ff,#1f6fff);
color:white;
font-size:16px;
}

.profilePanel textarea,
.profilePanel select{
width:90%;
margin:12px auto;
display:block;
padding:14px;
border:none;
border-radius:12px;
background:#0c234b;
color:white;
}

*{
box-sizing:border-box;
}

.dev{
text-align:center;
color:#6bb3ff;
margin-top:20px;
}

.editPic{
position:absolute;
bottom:10px;
right:38%;
background:#4aa8ff;
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

.dob{
width:90%;
padding:14px;
border-radius:12px;
border:none;
background:#0c234b;
color:white;
margin:12px auto;
display:block;
}

.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
color:#6bb3ff;
font-size:14px;
}
  
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="menuIcon" onclick="openProfile()">☰</div>

<h2>SSC LIBRARY</h2>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="bellIcon">
🔔
<span id="notifCount">0</span>
</div>
</div>

<div id="profilePanel" class="profilePanel">

<h2>👤 Student Profile</h2>

<div style="position:relative;text-align:center;">

<img id="profilePic" class="profilePic" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<label for="uploadPic" class="editPic">✏️</label>
<input type="file" id="uploadPic" accept="image/*" style="display:none">

</div>

<h2 class="studentName">Your Name</h2>

<textarea placeholder="Write your bio..."></textarea>

<input type="date" class="dob">
  
<button class="profileBtn">Save Profile</button>
<button class="profileBtn">Logout</button>
<button class="profileBtn" onclick="closeProfile()">Close</button>

<div class="footer">

<p>©2026-27 SSC LIBRARY HUB</p>

<p>Developer : Ajad Prajapati</p>

</div>

</div>
</div>
  
<!-- SEARCH -->

<div class="searchBox">
<input placeholder="🔎 Search your course...">
</div>

<!-- COURSES -->

<div id="courseList">

<a href="#" class="course-card">

<div style="display:flex;align-items:center">

<div class="course-icon">🎓</div>

<div class="course-info">
<h3>Hindi Eng</h3>
<p>Teacher</p>
</div>

</div>

<div class="course-arrow">➡</div>

</a>

</div>

<!-- SOCIAL -->

<div class="social">

<a href="https://wa.me/" target="_blank" class="socialBtn">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://t.me/" target="_blank" class="socialBtn">
<i class="fab fa-telegram"></i>
</a>

<a href="https://instagram.com/" target="_blank" class="socialBtn">
<i class="fab fa-instagram"></i>
</a>

<a href="https://youtube.com/" target="_blank" class="socialBtn">
<i class="fab fa-youtube"></i>
</a>

</div>
<script>

function openProfile(){
document.getElementById("profilePanel").style.transform="translateX(0)";
}

function closeProfile(){
document.getElementById("profilePanel").style.transform="translateX(-100%)";
}

document.getElementById("uploadPic").onchange = function(e){

let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(){
document.getElementById("profilePic").src = reader.result;
localStorage.setItem("profilePic",reader.result);
}

reader.readAsDataURL(file);

}

window.onload = function(){

let savedPic = localStorage.getItem("profilePic");

if(savedPic){
document.getElementById("profilePic").src = savedPic;
}

}

  </script>
</body>
</html>
