<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC LIBRARY</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020d22;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#08142b;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.menuIcon{
position:absolute;
left:20px;
font-size:28px;
cursor:pointer;
}

.bellIcon{
position:absolute;
right:20px;
font-size:24px;
cursor:pointer;
}

#notifCount{
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:20px;
position:absolute;
top:-8px;
right:-10px;
}

/* SEARCH */

.searchBox{
margin-top:90px;
display:flex;
justify-content:center;
}

.searchBox input{
width:85%;
padding:14px;
border:none;
border-radius:30px;
background:#081a3c;
color:white;
outline:none;
box-shadow:0 0 10px #0b7dd3;
}

/* COURSE */

#courseList{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.course-card{
width:85%;
background:#081a3a;
padding:20px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-decoration:none;
color:white;
}

.course-card{
width:85%;
}

.course-icon{
font-size:26px;
margin-right:15px;
}

.course-info h3{
margin:0;
}

.course-info p{
margin:3px 0;
color:#9db4ff;
}

.course-arrow{
font-size:24px;
}

/* SOCIAL ICONS */

.social{
position:fixed;
bottom:25px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.socialBtn{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:18px;
background:linear-gradient(135deg,#00b4ff,#007bff);
box-shadow:0 0 20px rgba(0,150,255,0.6);
font-size:24px;
color:white;
text-decoration:none;
transition:0.3s;
}

.socialBtn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00b4ff;
}

.sideMenu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#08142b;
padding:20px;
transition:0.3s;
z-index:2000;
}

.sideMenu h3{
margin-top:40px;
}

.sideMenu a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:18px;
}

.profilePanel{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#061a36;
padding:25px;
transition:0.4s;
z-index:3000;
overflow-x:hidden;
overflow-y:auto;

/* PANEL BY DEFAULT HIDE */
transform:translateX(-100%);
}

body{
overflow-x:hidden;
}
  
.profilePic{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #4aa8ff;
margin:30px auto;
}

#studentName{
font-size:24px;
font-weight:bold;
color:#ff3b3b;
text-align:center;
margin-top:12px;
letter-spacing:1px;
text-shadow:0 0 10px rgba(255,0,0,0.6);
font-family: 'Segoe UI', sans-serif;
}

.studentName{
text-align:center;
color:#7fb6ff;
}

.profileBtn{
width:90%;
padding:16px;
margin:10px auto;
display:block;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#4aa8ff,#1f6fff);
color:white;
font-size:16px;
}

.profilePanel textarea,
.profilePanel select{
width:90%;
margin:12px auto;
display:block;
padding:14px;
border:none;
border-radius:12px;
background:#0c234b;
color:white;
}

*{
box-sizing:border-box;
}

.dev{
text-align:center;
color:#6bb3ff;
margin-top:20px;
}

.editPic{
position:absolute;
bottom:30px;
right:35%;
background:#4aa8ff;
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

.profileInput{
width:90%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:#0c234b;
color:white;
margin:12px auto;
display:block;
font-size:15px;
box-sizing:border-box;
}

.profileInput::placeholder{
color:#a8c7ff;
}

input[type="date"]::-webkit-calendar-picker-indicator{
filter:invert(1);
cursor:pointer;
}

.footer{
text-align:center;
color:#6bb3ff;
font-size:14px;
margin-top:80px;
line-height:22px;
padding-bottom:30px;
}

.footer p{
margin:0;
}

.copy{
color:#8ec7ff;
font-size:14px;
}

.dev{
color:#3fa7ff;
font-size:14px;
font-weight:500;
}

.noticePopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.noticeBox{
background:#0b1b35;
padding:25px;
border-radius:15px;
width:85%;
max-width:400px;
text-align:center;
color:white;
border:2px solid #3a7bff;
}

.noticeBox button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3a7bff;
color:white;
font-size:15px;
}
.waBtn{
background:#25D366 !important;
}

.joinedBtn{
background:#1b2433 !important;
color:#9aa4b2 !important;
border:1px solid #2c3b55;
box-shadow:none !important;
}

.notificationPanel{
position:fixed;
top:70px;
left:0;
width:100%;
height:calc(100vh - 70px); /* 👈 यह add करो */
background:#111;
padding:15px;
z-index:9999;
display:none;
overflow-y:auto;
}

.notificationHeader{
display:flex;
justify-content:space-between;
align-items:center;
color:white;
font-size:18px;
margin-bottom:10px;
}

.notificationCard{
background:#0b1b35;
border:1px solid #3a7bff;
border-radius:12px;
padding:15px;
margin-bottom:12px;
color:white;
box-shadow:0 0 10px #1e3cff40;
}

.notificationTag{
background:#294bff;
padding:3px 10px;
border-radius:8px;
font-size:12px;
margin-bottom:6px;
display:inline-block;
}

.notificationTime{
float:right;
font-size:12px;
color:#aaa;
}
  
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

</head>

<body>

<script>
if(localStorage.getItem("login")!="true"){
window.location.href="login.html";
}
</script>

<!-- HEADER -->

<div class="header">

<div class="menuIcon" onclick="openProfile()">☰</div>


<h2>SSC LIBRARY</h2>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="bellIcon" onclick="openNotifications()">
🔔
<span id="notifCount">0</span>
</div>
</div>

<div id="profilePanel" class="profilePanel">

<h2>👤 Student Profile</h2>

<div style="position:relative;text-align:center;">

<img id="profileImg" class="profilePic" src="default.png" width="120">

<label for="photo" class="editPic">✏️</label>
<input type="file" id="photo" accept="image/*" style="display:none">

</div>

<h2 id="studentName">Your Name</h2>

<textarea id="bio" placeholder="Write your bio..."></textarea>

<input type="date" id="dob" class="profileInput">
  
<button class="profileBtn" onclick="saveProfile()">Save Profile</button>
<button class="profileBtn" onclick="logout()">Logout</button>
<button class="profileBtn" onclick="closeProfile()">Close</button>

<div class="footer">

<p class="copy">©2026-27 SSC LIBRARY HUB</p>
<p class="dev">Developer : Ajad Prajapati</p>

</div>

</div>
</div>

<!-- 🔔 NOTICE POPUP -->

<div id="noticePopup" class="noticePopup">

<div class="noticeBox">

<h2>📢 IMPORTANT NOTICE</h2>

<p>
All courses and materials on this website are provided completely free.
If anyone asks for money claiming to represent us, <b style="color:red;">PLEASE DO NOT PAY</b>.
</p>

<button onclick="joinChannel()">🔔 JOIN OFFICIAL CHANNEL</button>

<button class="waBtn" onclick="joinWhatsApp()">✨ JOIN WHATSAPP CHANNEL</button>

<button class="joinedBtn" onclick="closeNotice()">I HAVE ALREADY JOINED</button>

</div>

</div>

<!-- 🔔 NOTIFICATION PANEL -->

<div id="notificationPanel" class="notificationPanel">

<div class="notificationHeader">
<span>🔔 Notifications</span>
<span onclick="closeNotifications()" style="cursor:pointer">✖</span>
</div>

<div id="notificationList">

</div>

</div>

</div>
<!-- SEARCH -->

<div class="searchBox">
<input id="searchInput" placeholder="🔎 Search your course..." onkeyup="searchCourse()">
</div>

<!-- COURSES -->

<div id="courseList">


</div>

<!-- SOCIAL -->

<div class="social">

<a href="https://wa.me/" target="_blank" class="socialBtn">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://t.me/" target="_blank" class="socialBtn">
<i class="fab fa-telegram"></i>
</a>

<a href="https://instagram.com/" target="_blank" class="socialBtn">
<i class="fab fa-instagram"></i>
</a>

<a href="https://youtube.com/" target="_blank" class="socialBtn">
<i class="fab fa-youtube"></i>
</a>

</div>
<script>

const firebaseConfig = {
apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadCourses(){

let container = document.getElementById("courseList");

container.innerHTML="";

db.collection("courses").get().then((snapshot)=>{

snapshot.forEach((doc)=>{

let course = doc.data();

container.innerHTML += `
<a href="${course.link}" class="course-card">

<div style="display:flex;align-items:center">

<div class="course-icon">🎓</div>

<div class="course-info">
<h3>${course.name}</h3>
<p>${course.teacher}</p>
</div>

</div>

<div class="course-arrow">➜</div>

</a>
`;

});

});

}

loadCourses();

function searchCourse(){

let input = document.getElementById("searchInput").value.toLowerCase();

let courses = document.querySelectorAll(".course-card");

courses.forEach((course)=>{

let text = course.innerText.toLowerCase();

if(text.includes(input)){
course.style.display="flex";
}else{
course.style.display="none";
}

});

}

function loadNotifications(){

let list = document.getElementById("notificationList");
let count = document.getElementById("notifCount");

let joinTime = Number(localStorage.getItem("userJoinTime") || Date.now());
let lastRead = Number(localStorage.getItem("lastRead") || 0);

list.innerHTML="";
count.innerText = 0;

db.collection("notifications")
.orderBy("time","desc")
.onSnapshot((snapshot)=>{

let unread = 0;

snapshot.forEach((doc)=>{

let n = doc.data();

let oneDay = 24 * 60 * 60 * 1000;

// 24 घंटे बाद delete
if(Date.now() - n.time > oneDay){
db.collection("notifications").doc(doc.id).delete();
return;
}

// new user ko old notification na dikhe
if(n.time < joinTime){
return;
}

// unread count logic
if(n.time > lastRead){
unread++;
}

list.innerHTML += `
<div class="notificationCard">
<div class="notificationTag">${n.title}</div>
<span class="notificationTime">${new Date(n.time).toLocaleDateString()}</span>
<p>${n.message}</p>
</div>
`;

});

count.innerText = unread;

});

}

loadNotifications();

// 🔔 NOTICE POPUP SCRIPT

function closeNotice(){
document.getElementById("noticePopup").style.display="none";
localStorage.setItem("noticeSeen","yes");
}

function joinChannel(){
window.open("https://t.me/YOURCHANNEL","_blank");
}

function joinWhatsApp(){
window.open("https://whatsapp.com/channel/YOURCHANNEL","_blank");
}

// 🔔 NOTIFICATION FUNCTIONS
function openNotifications(){

// profile close
document.getElementById("profilePanel").style.transform="translateX(-100%)";

document.getElementById("notificationPanel").style.display="block";

document.getElementById("notifCount").innerText = 0;

localStorage.setItem("lastRead", Date.now());

}

function closeNotifications(){
document.getElementById("notificationPanel").style.display="none";
}


let student = JSON.parse(localStorage.getItem("student"));
let user = student.username;
  
function openProfile(){

// notification panel close
document.getElementById("notificationPanel").style.display="none";

// profile panel open
document.getElementById("profilePanel").style.transform="translateX(0)";

}

function closeProfile(){
document.getElementById("profilePanel").style.transform="translateX(-100%)";
}

function logout(){
localStorage.removeItem("login");
window.location.href="login.html";
}

function saveProfile(){

let student = JSON.parse(localStorage.getItem("student"));
let user = student.username;

let bio = document.getElementById("bio").value;
let dob = document.getElementById("dob").value;
let file = document.getElementById("photo").files[0];

if(file){

let storageRef = firebase.storage().ref("profiles/"+user);

storageRef.put(file).then(()=>{

storageRef.getDownloadURL().then((url)=>{

db.collection("students").doc(user).set({
bio: bio,
dob: dob,
photo: url
});

document.getElementById("profileImg").src = url;

alert("Profile Saved ✅");

});

});

}else{

db.collection("students").doc(user).set({
bio: bio,
dob: dob
},{merge:true});

localStorage.setItem(user+"_bio", bio);
localStorage.setItem(user+"_dob", dob);

alert("Profile Saved ✅");

}

}

document.getElementById("photo").onchange = function(e){

let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(){
document.getElementById("profileImg").src = reader.result;
localStorage.setItem(user+"_profilePic", reader.result);
}

reader.readAsDataURL(file);

}

window.onload = function(){

// profile photo
let savedPic = localStorage.getItem(user+"_profilePic");
if(savedPic){
document.getElementById("profileImg").src = savedPic;
}

// bio
let bio = localStorage.getItem(user+"_bio");
if(bio){
document.querySelector("textarea").value = bio;
}

// DOB
let dob = localStorage.getItem(user+"_dob");
if(dob){
document.getElementById("dob").value = dob;
}

// student name
let student = JSON.parse(localStorage.getItem("student"));

if(student){
document.getElementById("studentName").innerText = student.name;
}

firebase.auth().onAuthStateChanged((user)=>{

if(user){

db.collection("students").doc(user.uid).get()
.then((doc)=>{

if(doc.exists){

let data = doc.data();

document.getElementById("bio").value = data.bio || "";
document.getElementById("dob").value = data.dob || "";

document.getElementById("profileImg").src = data.photo || "https://cdn-icons-png.flaticon.com/512/847/847969.png";

}

});

}

});
  
}
  </script>
</body>
</html>
