<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SSC LIBRARY</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030d22;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#08142b;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.menu{
position:absolute;
left:20px;
font-size:28px;
cursor:pointer;
}

.bell{
position:absolute;
right:20px;
font-size:26px;
cursor:pointer;
}

#notifCount{
background:red;
padding:3px 7px;
border-radius:20px;
font-size:12px;
position:absolute;
top:-8px;
right:-10px;
}

/* SEARCH */

.search{
margin-top:90px;
display:flex;
justify-content:center;
}

.search input{
width:85%;
padding:12px;
border-radius:30px;
border:none;
background:#0a1b3c;
color:white;
}

/* COURSE CARD */

#courseList{
margin-top:40px;
display:flex;
justify-content:center;
}

.course-card{
width:85%;
background:#081a3a;
padding:20px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-decoration:none;
color:white;
}

/* SOCIAL */

.social{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

.social a{
background:#0b7dd3;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #0b7dd3;
}

/* SIDE MENU */

#sideMenu{
position:fixed;
top:0;
left:-300px;
width:300px;
height:100%;
background:#08142b;
transition:0.4s;
padding:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<h2>SSC LIBRARY</h2>

<div class="bell" onclick="toggleNotifications()">
🔔
<span id="notifCount">0</span>
</div>

</div>

<!-- SEARCH -->

<div class="search">
<input placeholder="🔎 Search your course...">
</div>

<!-- COURSES -->

<div id="courseList">

<a href="#" class="course-card">

<div>
<h3>Hindi Eng</h3>
<p>Teacher</p>
</div>

<div>➡</div>

</a>

</div>

<!-- SOCIAL -->

<div class="social">

<a href="#">📞</a>
<a href="#">✈</a>
<a href="#">📷</a>
<a href="#">▶</a>

</div>

<!-- SIDE MENU -->

<div id="sideMenu">

<h2>Student Profile</h2>

<input placeholder="Write your bio"><br><br>

<input type="date"><br><br>

<button>Save Profile</button><br><br>

<button>Logout</button>

</div>

<!-- NOTIFICATION PANEL -->

<div id="notifPanel" style="display:none;position:fixed;top:70px;width:100%;background:#0a1b3c;padding:20px">

<h3>Notifications</h3>

<div id="notifList"></div>

</div>

<script>

function toggleMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.left==="0px"){
menu.style.left="-300px";
}else{
menu.style.left="0px";
}

}

function toggleNotifications(){

let panel=document.getElementById("notifPanel");

panel.style.display=panel.style.display==="block"?"none":"block";

}

</script>

</body>
</html>
