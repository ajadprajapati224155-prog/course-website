<!-- Firebase Notification Code -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadCourses(){

db.collection("courses").get().then((snapshot)=>{

let container=document.getElementById("courseList");

container.innerHTML="";

snapshot.forEach((doc)=>{

let course=doc.data();

container.innerHTML+=`
<a href="${course.link}" class="course-card">

<div class="course-icon">🎓</div>

<div class="course-info">
<h3>${course.name}</h3>
<p>${course.teacher}</p>
</div>

<div class="course-arrow">➜</div>

</a>
`;

});

});

}

loadCourses();

const notifList = document.getElementById("notifList");
const notifCount = document.getElementById("notifCount");

db.collection("notifications").onSnapshot((snapshot)=>{

notifList.innerHTML="";
let unread = 0;

snapshot.forEach((doc)=>{

let data = doc.data();

let li=document.createElement("li");
li.innerHTML = `
<div class="notifCard">
<div class="notifTop">
<span class="notifTag">${data.title}</span>
<span class="notifTime">${data.time || ""}</span>
</div>
<div class="notifMsg">${data.message}</div>
</div>
`;

notifList.appendChild(li);

let read = localStorage.getItem("notifRead");

if(read !== "true"){
unread++;
}

});

notifCount.innerText=unread;

});
</script>
<script>

function toggleNotifications(){

let panel = document.getElementById("notifPanel");

if(panel.style.display === "block"){
panel.style.display = "none";
}else{
panel.style.display = "block";
}

}

window.onload = function(){
document.getElementById("notifPanel").style.display = "none";
}

let read = localStorage.getItem("notifRead");
let readTime = localStorage.getItem("notifReadTime");

if(read === "true" && readTime){

let now = Date.now();

let diff = now - parseInt(readTime);

let oneDay = 24 * 60 * 60 * 1000;

if(diff > oneDay){

document.getElementById("notifList").innerHTML = "";

localStorage.removeItem("notifRead");
localStorage.removeItem("notifReadTime");

document.getElementById("notifCount").innerText = "0";

}

}

}

</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

// PHOTO LOAD
let savedPic = localStorage.getItem("profilePic");
if(savedPic){
document.getElementById("profilePic").src = savedPic;
}

// BIO LOAD
let savedBio = localStorage.getItem("bio");
if(savedBio){
document.getElementById("bio").value = savedBio;
}

// DOB LOAD
let savedDob = localStorage.getItem("dob");
if(savedDob){
document.getElementById("dob").value = savedDob;
}

// USER NAME LOAD
let user = JSON.parse(localStorage.getItem("student"));
if(user){
document.getElementById("displayName").innerText = user.name;
}

});

document.getElementById("photoInput").addEventListener("change", function(){

let file = this.files[0];
let reader = new FileReader();

reader.onload = function(){
document.getElementById("profilePic").src = reader.result;
localStorage.setItem("profilePic", reader.result);
}

reader.readAsDataURL(file);

});
  
// PHOTO UPLOAD
document.getElementById("photoInput").addEventListener("change", function(){

let file = this.files[0];
let reader = new FileReader();

reader.onload = function(){
document.getElementById("profilePic").src = reader.result;
localStorage.setItem("profilePic", reader.result);
}

reader.readAsDataURL(file);

});


// SAVE PROFILE
document.getElementById("saveBtn").addEventListener("click", function(){

let bio = document.getElementById("bio").value;
let dob = document.getElementById("dob").value;

let user = JSON.parse(localStorage.getItem("student"));

if(!user){
alert("User not found");
return;
}

// Firestore update
db.collection("students").doc(user.username).update({

bio: bio,
dob: dob

});

localStorage.setItem("bio", bio);
localStorage.setItem("dob", dob);

alert("Profile saved successfully ✅");

});


// LOGOUT
function logout(){

localStorage.removeItem("student");

alert("Logged out successfully");

window.location="login.html";

}
</script>
