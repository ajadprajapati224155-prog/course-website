<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Library</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020b1f;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:65px;
background:#08142b;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

.menu{
position:absolute;
left:15px;
font-size:25px;
cursor:pointer;
}

.bell{
position:absolute;
right:15px;
font-size:22px;
cursor:pointer;
}

#notifCount{
position:absolute;
top:-6px;
right:-8px;
background:red;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* SEARCH */

.searchBox{
margin-top:90px;
padding:15px;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:30px;
border:none;
background:#08142b;
color:white;
outline:none;
}

/* COURSE */

#courseList{
padding:15px;
}

.course-card{
display:flex;
align-items:center;
justify-content:space-between;
background:#08142b;
padding:15px;
border-radius:15px;
margin-top:15px;
text-decoration:none;
color:white;
}

.course-icon{
font-size:25px;
background:#1a3d8f;
padding:10px;
border-radius:10px;
}

.course-info{
flex:1;
margin-left:15px;
}

.course-arrow{
font-size:20px;
color:#4da3ff;
}

/* NOTIFICATION PANEL */

#notifPanel{
position:fixed;
top:65px;
right:10px;
width:90%;
max-width:350px;
background:#08142b;
border-radius:10px;
display:none;
max-height:400px;
overflow-y:auto;
padding:10px;
}

.notifCard{
background:#020b1f;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.notifTop{
display:flex;
justify-content:space-between;
font-size:12px;
color:#4da3ff;
}

.notifMsg{
margin-top:5px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="menu">☰</div>

<div class="logo">SSC LIBRARY</div>

<div class="bell" onclick="toggleNotifications()">
🔔
<span id="notifCount">0</span>
</div>

</div>

<!-- SEARCH -->

<div class="searchBox">
<input type="text" id="search" placeholder="🔎 Search your course..." onkeyup="searchCourse()">
</div>

<!-- COURSES -->

<div id="courseList"></div>

<!-- NOTIFICATIONS -->

<div id="notifPanel">
<div id="notifList"></div>
</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
const firebaseConfig = {
apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* LOAD COURSES */

function loadCourses(){

db.collection("courses").get().then((snapshot)=>{

let container=document.getElementById("courseList");

container.innerHTML="";

snapshot.forEach((doc)=>{

let data=doc.data();

container.innerHTML+=`

<a href="${data.link}" class="course-card">

<div class="course-icon">🎓</div>

<div class="course-info">
<h3>${data.name}</h3>
<p>${data.teacher}</p>
</div>

<div class="course-arrow">➜</div>

</a>

`;

});

});

}

loadCourses();

/* SEARCH */

function searchCourse(){

let input=document.getElementById("search").value.toLowerCase();

let courses=document.querySelectorAll(".course-card");

courses.forEach(course=>{

let text=course.innerText.toLowerCase();

course.style.display=text.includes(input)?"flex":"none";

});

}

/* NOTIFICATION */

const notifList=document.getElementById("notifList");
const notifCount=document.getElementById("notifCount");

db.collection("notifications")
.orderBy("timestamp","desc")
.onSnapshot((snapshot)=>{

notifList.innerHTML="";

let count=0;

snapshot.forEach((doc)=>{

let data=doc.data();

let div=document.createElement("div");

div.className="notifCard";

div.innerHTML=`

<div class="notifTop">

<span>${data.title}</span>

<span>${data.time}</span>

</div>

<div class="notifMsg">${data.message}</div>

`;

notifList.appendChild(div);

count++;

});

notifCount.innerText=count;

});

/* TOGGLE */

function toggleNotifications(){

let panel=document.getElementById("notifPanel");

panel.style.display=panel.style.display==="block"?"none":"block";

notifCount.innerText="0";

}

</script>

</body>
</html>
