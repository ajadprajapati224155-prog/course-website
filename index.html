<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SSC Library</title>

<style>

body{
background:#0b0f1f;
font-family:sans-serif;
color:white;
margin:0;
}

.header{
text-align:center;
padding:30px;
}

.header h1{
color:#4da3ff;
font-size:32px;
}

.search{
width:90%;
margin:auto;
padding:15px;
border-radius:15px;
border:none;
background:#111;
color:white;
display:block;
}

.course{
background:linear-gradient(45deg,#1a1a1a,#222);
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px #000;
}

.course h2{
margin:0;
}

.btn{
display:block;
margin-top:15px;
padding:15px;
text-decoration:none;
background:#1e88ff;
border-radius:10px;
color:white;
text-align:center;
}

.social{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px;
}

.social a{
color:white;
font-size:22px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

<h1>SSC LIBRARY</h1>

<input class="search" placeholder="Search your course...">

</div>

<div class="course">

<h2>Maths SPL VOD Batch</h2>

<a class="btn" href="#">📹 Classes</a>

<a class="btn" href="#">📄 Notes</a>

</div>

<div class="course">

<h2>Reasoning SPL Batch</h2>

<a class="btn" href="#">📹 Classes</a>

<a class="btn" href="#">📄 Notes</a>

</div>

<div class="course">

<h2>English Special Batch</h2>

<a class="btn" href="#">📹 Classes</a>

<a class="btn" href="#">📄 Notes</a>

</div>

<div class="social">

<a href="#">🟢 WhatsApp</a>

<a href="#">🔵 Telegram</a>

<a href="#">📸 Instagram</a>

<a href="#">▶ YouTube</a>

</div>

</body>

</html>
