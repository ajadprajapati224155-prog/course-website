<style>

body{

margin:0;

.header{

.search{

border:none;

background:#111;

}

.container{
padding-bottom:40px;

.course{
background:linear-gradient(45deg,#1a1a1a,#222);
margin:20px;
padding:20px;
border-radius:20px;

}

.course h2{

.btn{

padding:15px;

}

.social{

justify-content:center;

.social a{

color:white;
background:linear-gradient(45deg,#0072ff,#00c6ff);
padding:14px;
border-radius:15px;
box-shadow:0 0 15px #0072ff;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
}
.notify{
position:fixed;
top:20px;
right:20px;
font-size:24px;
cursor:pointer;
}

.notifCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

.notifPanel{
display:none;
position:fixed;
top:70px;
right:20px;
width:300px;
background:#111;
color:white;
border-radius:10px;
padding:15px;
box-shadow:0 0 10px #000;
}

.notifPanel ul{
list-style:none;
padding:0;
}

.notifPanel li{
padding:10px;
border-bottom:1px solid #333;
}

.notifHeader{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.notificationBox li{
padding:10px;
border-bottom:1px solid #333;
}
</style>

<body>

<script>

function searchCourse(){

let input=document.getElementById("search").value.toLowerCase();

let courses=document.querySelectorAll(".course");

courses.forEach(course=>{

let text=course.innerText.toLowerCase();

course.style.display=text.includes(input)?"block":"none";

});

}

function enableNotification(){

Notification.requestPermission().then(function(permission){

if(permission==="granted"){

new Notification("SSC Library",{body:"Notifications Enabled 🔔"});

}

});

}

</script>

<!-- Firebase Notification Code -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC-WBjodD1mPq5RRTknOICq4b0pCBRx-FGc",
authDomain: "ssc-library.firebaseapp.com",
projectId: "ssc-library",
storageBucket: "ssc-library.firebasestorage.app",
messagingSenderId: "1062574277938",
appId: "1:1062574277938:web:0e9427e75888816c07c32b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const notifList = document.getElementById("notifList");
const notifCount = document.getElementById("notifCount");

db.collection("notifications").onSnapshot((snapshot)=>{

notifList.innerHTML="";
let unread = 0;

snapshot.forEach((doc)=>{

let data = doc.data();

let li=document.createElement("li");
li.innerHTML="<b>"+data.title+"</b><br>"+data.message;

notifList.appendChild(li);

unread++;

});

notifCount.innerText=unread;

});
</script>
<script>

function toggleNotifications(){

let panel = document.getElementById("notifPanel");
let count = document.getElementById("notifCount");

if(panel.style.display === "block"){
panel.style.display = "none";
}else{
panel.style.display = "block";

count.innerText = "0";   // red number reset
}

}

</script>
