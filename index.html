<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC LIBRARY</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020d22;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#08142b;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.menuIcon{
position:absolute;
left:20px;
font-size:28px;
cursor:pointer;
}

.bellIcon{
position:absolute;
right:20px;
font-size:24px;
cursor:pointer;
}

#notifCount{
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:20px;
position:absolute;
top:-8px;
right:-10px;
}

/* SEARCH */

.searchBox{
margin-top:90px;
display:flex;
justify-content:center;
}

.searchBox input{
width:85%;
padding:14px;
border:none;
border-radius:30px;
background:#081a3c;
color:white;
outline:none;
box-shadow:0 0 10px #0b7dd3;
}

/* COURSE */

#courseList{
margin-top:40px;
display:flex;
justify-content:center;
}

.course-card{
width:85%;
background:#081a3a;
padding:20px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-decoration:none;
color:white;
}

.course-icon{
font-size:26px;
margin-right:15px;
}

.course-info h3{
margin:0;
}

.course-info p{
margin:3px 0;
color:#9db4ff;
}

.course-arrow{
font-size:24px;
}

/* SOCIAL ICONS */

.social{
position:fixed;
bottom:25px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.social a{
background:#0b7dd3;
padding:15px;
border-radius:18px;
box-shadow:0 0 20px #0b7dd3;
font-size:20px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="menuIcon">☰</div>

<h2>SSC LIBRARY</h2>

<div class="bellIcon">
🔔
<span id="notifCount">0</span>
</div>

</div>

<!-- SEARCH -->

<div class="searchBox">
<input placeholder="🔎 Search your course...">
</div>

<!-- COURSES -->

<div id="courseList">

<a href="#" class="course-card">

<div style="display:flex;align-items:center">

<div class="course-icon">🎓</div>

<div class="course-info">
<h3>Hindi Eng</h3>
<p>Teacher</p>
</div>

</div>

<div class="course-arrow">➡</div>

</a>

</div>

<!-- SOCIAL -->

<div class="social">

<a href="#">📞</a>
<a href="#">✈</a>
<a href="#">📷</a>
<a href="#">▶</a>

</div>

</body>
</html>
