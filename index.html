<script>

function searchCourse(){

let input=document.getElementById("search").value.toLowerCase();

let courses=document.querySelectorAll(".course");

courses.forEach(course=>{

let text=course.innerText.toLowerCase();

course.style.display=text.includes(input)?"block":"none";

});

}

function enableNotification(){

Notification.requestPermission().then(function(permission){

if(permission==="granted"){

new Notification("SSC Library",{body:"Notifications Enabled 🔔"});

}

});

}

</script>

<script>

let notifications = JSON.parse(localStorage.getItem("ssc_notifications")) || [];

function updateNotificationUI(){

let list = document.getElementById("notifList");
let count = document.getElementById("notifCount");

list.innerHTML="";

notifications.forEach(msg=>{
let li=document.createElement("li");
li.innerText=msg;
list.appendChild(li);
});

count.innerText=notifications.length;

}

function toggleNotifications(){

let panel=document.getElementById("notifPanel");

panel.style.display = panel.style.display==="block" ? "none" : "block";

}

function addNotification(msg){

notifications.unshift(msg);

localStorage.setItem("ssc_notifications",JSON.stringify(notifications));

updateNotificationUI();
location.reload();
}

updateNotificationUI();

</script>
